<main>
<section>

    <div class="wrapper">
        <div class="contact">
            <h2>CONTACT</h2>
            <p>
                If you have any questions about our product or business, feel free to contact us using the form below or email us at info@gunna.com.
            </p>
        </div>
    </div>

    <div class="wrapper contact-layout">

        <div class="contact-image">
            <img src="contact.jpg" id="contactjpg" alt="contact clothing" loading="lazy">
        </div>

        <article id="contactform">
            <form action="https://httpbin.org/get" method="get">

                <label for="name">Name:</label>
                <input type="text" name="name" id="name" placeholder="Your name" autocomplete="on" required autofocus>

                <p>
                    <label for="last-name">Last Name:</label>
                    <input type="text" name="last-name" id="last-name" placeholder="Your last name" autocomplete="on" required>
                </p>

                <p>
                    <label for="phone">Phone:</label>
                    <input type="tel" name="phone" id="phone" placeholder="Phone" pattern="[0-9]{9,12}" required>
                </p>

                <button type="submit">SUBMIT NOW</button>

            </form>
        </article>

    </div>

</section>
